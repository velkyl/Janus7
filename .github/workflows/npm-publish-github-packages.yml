# CI for the JANUS7 repo.
# The module is shipped as a Foundry package, not as an npm package.

name: Validate JANUS7

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --version
      - run: npm --version
      - run: npm run validate
